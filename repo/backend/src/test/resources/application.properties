# Keep MySQL; do not substitute embedded DB (Flyway SQL is MySQL-specific).
spring.test.database.replace=none
# Explicit JDBC settings so tests always see a URL (avoids lost merge of spring.datasource from main application.yml).
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:scholarops}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:scholarops}
spring.datasource.password=${DB_PASSWORD:scholarops_secret}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# JWT/AES defaults for local Maven (Docker sets env; use .properties so we do not replace nested scholarops.* maps from application.yml).
scholarops.jwt.secret=${JWT_SECRET:c2Nob2xhcm9wcy1vZmZsaW5lLWxlYXJuaW5nLXN5c3RlbS1zZWNyZXQta2V5LW11c3QtYmUtYXQtbGVhc3QtMjU2LWJpdHM=}
scholarops.jwt.expiration-ms=3600000
scholarops.jwt.refresh-expiration-ms=86400000
scholarops.aes.secret-key=${SCHOLAROPS_AES_KEY:0123456789abcdef0123456789abcdef}
