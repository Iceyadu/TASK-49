services:
  mysql:
    image: mysql:8.0
    container_name: scholarops-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret}
      MYSQL_DATABASE: scholarops
      MYSQL_USER: scholarops
      MYSQL_PASSWORD: ${DB_PASSWORD:-scholarops_secret}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: >
      --default-authentication-plugin=caching_sha2_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: maven:3.9.6-eclipse-temurin-17
    container_name: scholarops-backend
    working_dir: /repo/backend
    command: sh -lc "mvn -q spring-boot:run"
    volumes:
      - ./:/repo
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: scholarops
      DB_USERNAME: scholarops
      DB_PASSWORD: ${DB_PASSWORD:-scholarops_secret}
      JWT_SECRET: ${JWT_SECRET:-c2Nob2xhcm9wcy1vZmZsaW5lLWxlYXJuaW5nLXN5c3RlbS1zZWNyZXQta2V5LW11c3QtYmUtYXQtbGVhc3QtMjU2LWJpdHM=}
      SCHOLAROPS_AES_KEY: ${AES_KEY:-0123456789abcdef0123456789abcdef}
    ports:
      - "8080:8080"

  frontend:
    image: node:20-alpine
    container_name: scholarops-frontend
    working_dir: /repo/frontend
    command: sh -lc "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./:/repo
    depends_on:
      backend:
        condition: service_started
    environment:
      VITE_API_BASE_URL: http://backend:8080
    ports:
      - "5173:5173"

volumes:
  mysql-data:
