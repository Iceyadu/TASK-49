services:
  mysql:
    image: mysql:8.0
    container_name: scholarops-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret}
      MYSQL_DATABASE: scholarops
      MYSQL_USER: scholarops
      MYSQL_PASSWORD: ${DB_PASSWORD:-scholarops_secret}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: >
      --default-authentication-plugin=caching_sha2_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scholarops-net

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    image: scholarops-backend:local
    container_name: scholarops-backend
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: scholarops
      DB_USERNAME: scholarops
      DB_PASSWORD: ${DB_PASSWORD:-scholarops_secret}
      JWT_SECRET: ${JWT_SECRET:-c2Nob2xhcm9wcy1vZmZsaW5lLWxlYXJuaW5nLXN5c3RlbS1zZWNyZXQta2V5LW11c3QtYmUtYXQtbGVhc3QtMjU2LWJpdHM=}
      SCHOLAROPS_AES_KEY: ${AES_KEY:-0123456789abcdef0123456789abcdef}
      CRAWL_STORAGE: /data/crawl-storage
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "8080:8080"
    volumes:
      - crawl-storage:/data/crawl-storage
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - scholarops-net

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    image: scholarops-frontend:local
    container_name: scholarops-frontend
    ports:
      # Default 8088 avoids conflict with local services bound to host port 80.
      - "${FRONTEND_PORT:-8088}:80"
    depends_on:
      - backend
    networks:
      - scholarops-net

volumes:
  mysql-data:
  crawl-storage:

networks:
  scholarops-net:
    driver: bridge
